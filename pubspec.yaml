name: markdown_viewer
description: A mobile-first markdown viewer for iOS and Android with rich rendering for mermaid, math, code, tables, and more.
publish_to: 'none'
version: 0.2.2+1

environment:
  sdk: ">=3.7.0 <4.0.0"
  flutter: ">=3.41.0"

# All version constraints below are best-effort recent values that match
# the choices in docs/tech-stack.md and the relevant ADRs. If `flutter pub
# get` reports a conflict on the installed Flutter 3.41+ SDK, bump the
# offending caret range and re-resolve. Do not loosen any constraint to
# `any` and do not introduce a new top-level dependency without a matching
# ADR (see docs/standards/architecture-standards.md).

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # в”Ђв”Ђ i18n в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Pinned by `flutter_localizations` from the Flutter 3.41 SDK.
  intl: ^0.20.2

  # в”Ђв”Ђ State management & DI в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # ADR-0002. Riverpod 3.x is required because the 2.x line pulls in
  # `analyzer_plugin 0.12.0`, which is incompatible with the analyzer
  # bundled with Flutter 3.41.
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # в”Ђв”Ђ Navigation в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # ADR-0003
  go_router: ^14.6.2

  # в”Ђв”Ђ Markdown parsing & rendering в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # ADR-0004
  markdown: ^7.2.2
  markdown_widget: ^2.3.2+8
  # `flutter_highlight` is the syntax-highlight library that
  # `markdown_widget` uses internally for fenced code blocks. We depend
  # on it directly so MarkdownView can pin a specific theme map
  # (`atomOneLight` / `atomOneDark`) on its custom PreConfig instead of
  # relying on the package's a11y defaults.
  flutter_highlight: ^0.7.0
  re_highlight: ^0.0.3
  flutter_highlighting: ^0.9.0

  # в”Ђв”Ђ Mermaid в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # ADR-0005
  flutter_inappwebview: ^6.1.5
  flutter_svg: ^2.0.16

  # в”Ђв”Ђ Math в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # ADR-0006
  flutter_math_fork: ^0.7.3

  # в”Ђв”Ђ Local storage в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # ADR-0007
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3

  # в”Ђв”Ђ File I/O & share intents в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  file_picker: ^8.1.4
  receive_sharing_intent: ^1.8.1
  # url_launcher is already in the tree via markdown_widget; declared
  # here so callers can import it directly without relying on a
  # transitive path.
  url_launcher: ^6.3.2

  # в”Ђв”Ђ Theming в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # ADR-0008
  dynamic_color: ^1.7.0

  # в”Ђв”Ђ Repo sync (network) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # ADR-0011, ADR-0012
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2

  # в”Ђв”Ђ Models & serialization в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # в”Ђв”Ђ Observability в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # ADR-0014 Phase 2. Crash reporting, performance tracing, and
  # breadcrumbs. Gated behind a user opt-in toggle in Settings and
  # a build-time SENTRY_DSN dart-define вЂ” disabled by default and
  # when the DSN is empty (local development without Sentry).
  sentry_flutter: ^9.0.0
  sentry_dio: ^9.0.0

  # в”Ђв”Ђ Utilities в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  logger: ^2.5.0
  path: ^1.9.0
  crypto: ^3.0.6

  # в”Ђв”Ђ Display / system в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Keeps the screen awake while the viewer is open when the user
  # enables "Keep screen on" in settings. Uses
  # UIApplication.isIdleTimerDisabled on iOS and
  # PowerManager.WakeLock on Android вЂ” no special entitlements needed.
  wakelock_plus: ^1.2.11
  share_plus: ^12.0.2
  pdf: ^3.12.0
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.3
  flutter_launcher_icons: ^0.14.3

  # в”Ђв”Ђ Codegen в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  build_runner: ^2.13.1
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  drift_dev: ^2.21.0
  go_router_builder: ^4.2.1

  # в”Ђв”Ђ Custom lints (Riverpod) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Temporarily removed because of an analyzer-version split across the
  # codegen ecosystem (freezed 3.x and riverpod 3.x require analyzer ^9
  # while custom_lint 0.8 still pins analyzer ^8). Re-enable by adding
  #   custom_lint: ^0.8.x
  #   riverpod_lint: ^3.x.x
  # once those packages realign on a single analyzer line.

  # в”Ђв”Ђ Testing в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  mocktail: ^1.0.4
  alchemist: ^0.12.1

  # Flutter's official leak detector вЂ” ships with the SDK and is wired
  # up globally in `test/flutter_test_config.dart` so every `testWidgets`
  # call reports undisposed `ChangeNotifier` / `AnimationController` /
  # `TextEditingController` / `Ticker` instances and objects that
  # outlive their expected GC boundary.
  leak_tracker_flutter_testing: ^3.0.9

  # Transitive dependency of `markdown_widget` that schedules a 500 ms
  # debounce timer on paint. Exposed here so widget tests can import
  # `VisibilityDetectorController` and collapse the debounce to zero,
  # otherwise `flutter_test` reports the timer as a pending-timer leak
  # when a test pumps a MarkdownView.
  visibility_detector: ^0.4.0+2

flutter:
  uses-material-design: true

  # Enables `flutter gen-l10n` to generate AppLocalizations from ARB files
  # under `lib/l10n/`. See `l10n.yaml` for the generation configuration.
  generate: true

  # Bundled mermaid runtime вЂ” see ADR-0005. The file itself is not
  # committed; `tool/fetch_mermaid.sh` downloads the pinned version
  # with SHA-256 verification before `flutter build` / `flutter test`.
  # `assets/icons/` will be added once the in-app icons are bundled.
  assets:
    - assets/mermaid/

  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter/Inter-Bold.ttf
  #         weight: 700
