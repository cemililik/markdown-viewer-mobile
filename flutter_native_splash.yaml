# flutter_native_splash configuration.
# Run `dart run flutter_native_splash:create` to apply.
# Run `dart run flutter_native_splash:remove` to revert to defaults.

flutter_native_splash:
  # ── Backgrounds ──────────────────────────────────────────────────
  # Light: soft neutral gray that reads as "paper" and complements
  # the Material 3 surface tone. Dark: deeper gray that sits between
  # the dark theme surface and true black.
  color: "#F2F2F7"
  color_dark: "#2C2C2E"

  # ── Center icon ──────────────────────────────────────────────────
  # The 1024×1024 app icon is rendered at platform-appropriate
  # sizes (120 pt on iOS, varies by density on Android). The
  # `image` key places it as a centred bitmap on top of the
  # background colour.
  image: assets/icon/splash_icon.png
  image_dark: assets/icon/splash_icon.png

  # ── Android 12+ branded splash ──────────────────────────────────
  # Material You guidelines require a circular icon background on
  # the splash screen. The icon foreground is sourced from the
  # adaptive icon foreground asset so it aligns with the launcher
  # appearance.
  android_12:
    color: "#F2F2F7"
    color_dark: "#2C2C2E"
    image: assets/icon/icon_foreground.png
    image_dark: assets/icon/icon_foreground.png
    icon_background_color: "#F2F2F7"
    icon_background_color_dark: "#2C2C2E"
